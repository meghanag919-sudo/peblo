<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d1fae5" />
      <stop offset="100%" stop-color="#a7f3d0" />
    </linearGradient>
    <linearGradient id="fishGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#eab308" />
    </linearGradient>
    <linearGradient id="finGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f472b6" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="url(#bgGrad)" />

  <!-- Seaweed bubbles -->
  <circle cx="45" cy="50" r="6" fill="none" stroke="#6ee7b7" stroke-width="2" opacity="0.6" />
  <circle cx="55" cy="35" r="4" fill="none" stroke="#6ee7b7" stroke-width="1.5" opacity="0.6" />
  <circle cx="50" cy="22" r="3" fill="none" stroke="#6ee7b7" stroke-width="1" opacity="0.6" />

  <!-- Rainbow Fish Group -->
  <g transform="translate(10, 10)">
    <!-- Tail Fin -->
    <path d="M125,90 L165,55 C170,65 170,115 165,125 Z" fill="url(#finGrad)" />
    <path d="M125,90 L155,70 C158,78 158,102 155,110 Z" fill="#ffffff" opacity="0.3" />

    <!-- Main Fish Body -->
    <path d="M30,90 C55,50 115,50 135,90 C115,130 55,130 30,90 Z" fill="url(#fishGrad)" />

    <!-- Top Fin -->
    <path d="M80,62 Q105,35 120,58 Z" fill="url(#finGrad)" />

    <!-- Bottom Fin -->
    <path d="M85,118 Q105,140 115,120 Z" fill="url(#finGrad)" />

    <!-- Eye -->
    <circle cx="55" cy="82" r="8" fill="#ffffff" />
    <circle cx="57" cy="82" r="4" fill="#1e3a8a" />
    <circle cx="55" cy="80" r="1.5" fill="#ffffff" />

    <!-- Mouth -->
    <path d="M30,92 Q24,90 28,86" fill="none" stroke="#ec4899" stroke-width="3" stroke-linecap="round" />

    <!-- Shiny Scales (illustrative arcs) -->
    <path d="M80,75 Q75,90 80,105" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.7" />
    <path d="M95,75 Q90,90 95,105" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.5" />
    <path d="M110,80 Q105,90 110,100" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.3" />
    
    <!-- Single Lost scale glowing on the side -->
    <path d="M135,125 A 8,8 0 1,1 145,135 A 8,8 0 1,1 135,125 Z" fill="#38bdf8" filter="drop-shadow(0 0 4px #0ea5e9)" />
  </g>
</svg>
