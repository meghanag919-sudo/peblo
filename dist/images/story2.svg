<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0e7fe" />
      <stop offset="100%" stop-color="#d8b4fe" />
    </linearGradient>
    <linearGradient id="mapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="100%" stop-color="#fde047" />
    </linearGradient>
    <linearGradient id="moonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="100%" stop-color="#facc15" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="url(#bgGrad)" />

  <!-- Moon in the Sky -->
  <path d="M140,40 A 25,25 0 1,0 165,65 A 20,20 0 1,1 140,40 Z" fill="url(#moonGrad)" filter="drop-shadow(0px 4px 6px rgba(250, 204, 21, 0.4))" />

  <!-- Stars -->
  <path d="M110,35 L112,40 L117,41 L112,43 L110,48 L108,43 L103,41 L108,40 Z" fill="#ffffff" />
  <path d="M45,75 L46.5,78.5 L50,79 L46.5,80.5 L45,84 L43.5,80.5 L40,79 L43.5,78.5 Z" fill="#ffffff" opacity="0.8" />

  <!-- Glowing Map -->
  <g transform="translate(45, 80) rotate(-5)">
    <!-- Map Base Roll -->
    <path d="M10,15 L90,10 C100,10 100,25 90,25 L10,30 C0,30 0,15 10,15 Z" fill="#fef08a" />
    
    <!-- Map Body -->
    <path d="M5,22 L105,17 L100,75 L0,80 Z" fill="url(#mapGrad)" stroke="#e2e8f0" stroke-width="1" />
    
    <!-- Rolled End -->
    <path d="M100,68 L10,73 C0,73 0,88 10,88 L100,83 C110,83 110,68 100,68 Z" fill="#fef08a" />
    
    <!-- Map Markings (dotted path, mountains, X marks the spot) -->
    <path d="M15,35 Q 35,45 55,30 T 85,55" fill="none" stroke="#7c3aed" stroke-width="3" stroke-dasharray="4,4" stroke-linecap="round" />
    
    <!-- Red X -->
    <path d="M80,50 L90,60 M90,50 L80,60" stroke="#f43f5e" stroke-width="4" stroke-linecap="round" />
    
    <!-- Small Castle/Mountain icon -->
    <polygon points="30,60 40,45 50,60" fill="#a78bfa" />
    <polygon points="45,62 52,50 60,62" fill="#8b5cf6" />
  </g>
</svg>
