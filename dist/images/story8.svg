<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ede9fe" />
      <stop offset="100%" stop-color="#ddd6fe" />
    </linearGradient>
    <linearGradient id="balloonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#be123c" />
    </linearGradient>
    <linearGradient id="hillGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a7f3d0" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="url(#bgGrad)" />

  <!-- Green Hills -->
  <path d="M-10,200 Q 40,140 100,165 T 210,150 L210,200 Z" fill="url(#hillGrad)" />
  <path d="M-10,200 Q 80,160 140,172 T 210,170 L210,200 Z" fill="#047857" opacity="0.7" />

  <!-- Balloon String -->
  <path d="M100,105 Q 90,135 105,160" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" />

  <!-- Red Balloon -->
  <g transform="translate(100, 65)">
    <!-- Balloon Body -->
    <ellipse cx="0" cy="-10" rx="28" ry="34" fill="url(#balloonGrad)" filter="drop-shadow(0 6px 10px rgba(190,18,60,0.3))" />
    
    <!-- Balloon Knot -->
    <polygon points="0,22 -6,28 6,28" fill="#be123c" />

    <!-- Balloon Highlight -->
    <ellipse cx="-12" cy="-20" rx="8" ry="12" fill="#ffffff" opacity="0.4" transform="rotate(-15 -12 -20)" />
  </g>

  <!-- Clouds -->
  <path d="M30,55 C 30,48 40,42 48,46 C 53,42 63,45 65,51 C 70,51 75,56 72,62 C 70,66 30,66 30,55 Z" fill="#ffffff" opacity="0.85" />
</svg>
