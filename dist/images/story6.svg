<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fed7aa" />
      <stop offset="100%" stop-color="#fdba74" />
    </linearGradient>
    <linearGradient id="lanternGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7c2d12" />
      <stop offset="100%" stop-color="#431407" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="40%" stop-color="#fef08a" />
      <stop offset="100%" stop-color="rgba(234, 88, 12, 0)" />
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="url(#bgGrad)" />

  <!-- Stars in Background -->
  <path d="M40,30 L41.5,33.5 L45,34 L41.5,34.5 L40,38 L38.5,34.5 L35,34 L38.5,33.5 Z" fill="#ffffff" opacity="0.8" />
  <path d="M160,50 L161,52 L163,52.5 L161,53 L160,55 L159,53 L157,52.5 L159,52 Z" fill="#ffffff" opacity="0.6" />
  <path d="M50,150 L51,152 L53,152.5 L51,153 L50,155 L49,153 L47,152.5 L49,152 Z" fill="#ffffff" opacity="0.6" />

  <!-- Lantern Handle -->
  <path d="M100,55 C70,55 70,85 70,85" fill="none" stroke="url(#lanternGrad)" stroke-width="5" stroke-linecap="round" />
  
  <!-- Lantern Glass Glow -->
  <circle cx="100" cy="115" r="35" fill="url(#glow)" />

  <!-- Lantern Top Cap -->
  <path d="M75,85 L125,85 L115,70 L85,70 Z" fill="url(#lanternGrad)" />
  <rect x="90" y="62" width="20" height="8" rx="2" fill="#78350f" />

  <!-- Lantern Frame / Guard Rails -->
  <path d="M78,85 L78,135 C78,145 122,145 122,135 L122,85" fill="none" stroke="url(#lanternGrad)" stroke-width="5" />
  <path d="M100,85 L100,140" fill="none" stroke="url(#lanternGrad)" stroke-width="3" opacity="0.4" />
  
  <!-- Lantern Flame -->
  <path d="M100,102 C108,102 112,115 100,125 C88,115 92,102 100,102 Z" fill="#ea580c" filter="drop-shadow(0 0 6px #facc15)" />
  <path d="M100,108 C104,108 107,116 100,122 C93,116 96,108 100,108 Z" fill="#facc15" />

  <!-- Lantern Base -->
  <rect x="70" y="135" width="60" height="12" rx="4" fill="url(#lanternGrad)" />
  <rect x="78" y="147" width="44" height="6" rx="2" fill="#1c1917" />
</svg>
