<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe" />
      <stop offset="100%" stop-color="#bae6fd" />
    </linearGradient>
    <linearGradient id="robotGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#94a3b8" />
      <stop offset="100%" stop-color="#64748b" />
    </linearGradient>
    <linearGradient id="gearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <rect width="200" height="200" rx="40" fill="url(#bgGrad)" />
  
  <!-- Robot Body -->
  <rect x="65" y="70" width="70" height="60" rx="15" fill="url(#robotGrad)" />
  <rect x="75" y="65" width="50" height="8" rx="4" fill="#475569" />
  
  <!-- Robot Eyes -->
  <circle cx="85" cy="95" r="10" fill="#0284c7" />
  <circle cx="85" cy="95" r="4" fill="#e0f2fe" />
  <circle cx="115" cy="95" r="10" fill="#0284c7" />
  <circle cx="115" cy="95" r="4" fill="#e0f2fe" />
  
  <!-- Robot Mouth -->
  <rect x="90" y="115" width="20" height="4" rx="2" fill="#334155" />
  
  <!-- Antenna -->
  <line x1="100" y1="65" x2="100" y2="45" stroke="#475569" stroke-width="4" stroke-linecap="round" />
  <circle cx="100" cy="42" r="8" fill="#f43f5e" />

  <!-- Ears/Side Bolts -->
  <rect x="58" y="90" width="7" height="15" rx="3" fill="#475569" />
  <rect x="135" y="90" width="7" height="15" rx="3" fill="#475569" />

  <!-- Blue Gear -->
  <g transform="translate(135, 135) scale(0.9)">
    <circle cx="0" cy="0" r="25" fill="url(#gearGrad)" />
    <!-- Teeth -->
    <rect x="-6" y="-32" width="12" height="64" rx="3" fill="url(#gearGrad)" transform="rotate(0)" />
    <rect x="-6" y="-32" width="12" height="64" rx="3" fill="url(#gearGrad)" transform="rotate(45)" />
    <rect x="-6" y="-32" width="12" height="64" rx="3" fill="url(#gearGrad)" transform="rotate(90)" />
    <rect x="-6" y="-32" width="12" height="64" rx="3" fill="url(#gearGrad)" transform="rotate(135)" />
    <!-- Inner hole -->
    <circle cx="0" cy="0" r="28" fill="none" stroke="#bae6fd" stroke-width="3" />
    <circle cx="0" cy="0" r="10" fill="#e0f2fe" />
  </g>
</svg>
