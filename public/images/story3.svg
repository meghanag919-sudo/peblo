<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7" />
      <stop offset="100%" stop-color="#fde68a" />
    </linearGradient>
    <linearGradient id="catGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fb923c" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <linearGradient id="keyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="url(#bgGrad)" />

  <!-- Milo the Cat -->
  <g transform="translate(10, 0)">
    <!-- Cat Ears -->
    <polygon points="45,80 35,40 65,55" fill="url(#catGrad)" />
    <polygon points="48,76 41,48 61,58" fill="#ffedd5" />
    
    <polygon points="115,80 125,40 95,55" fill="url(#catGrad)" />
    <polygon points="112,76 119,48 99,58" fill="#ffedd5" />

    <!-- Cat Head -->
    <ellipse cx="80" cy="95" rx="45" ry="38" fill="url(#catGrad)" />

    <!-- Cat Eyes -->
    <ellipse cx="63" cy="90" rx="8" ry="10" fill="#334155" />
    <circle cx="60" cy="87" r="3" fill="#ffffff" />
    
    <ellipse cx="97" cy="90" rx="8" ry="10" fill="#334155" />
    <circle cx="94" cy="87" r="3" fill="#ffffff" />

    <!-- Cat Nose -->
    <polygon points="80,105 75,98 85,98" fill="#f43f5e" />

    <!-- Cat Mouth -->
    <path d="M74,110 Q80,115 80,110 Q80,115 86,110" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round" />

    <!-- Whiskers -->
    <line x1="28" y1="100" x2="8" y2="98" stroke="#fdba74" stroke-width="3" stroke-linecap="round" />
    <line x1="28" y1="106" x2="6" y2="108" stroke="#fdba74" stroke-width="3" stroke-linecap="round" />
    <line x1="132" y1="100" x2="152" y2="98" stroke="#fdba74" stroke-width="3" stroke-linecap="round" />
    <line x1="132" y1="106" x2="154" y2="108" stroke="#fdba74" stroke-width="3" stroke-linecap="round" />
  </g>

  <!-- Golden Key -->
  <g transform="translate(115, 115) rotate(35)">
    <!-- Key Head Ring -->
    <circle cx="20" cy="20" r="16" fill="none" stroke="url(#keyGrad)" stroke-width="7" />
    <!-- Key Shaft -->
    <rect x="36" y="16" width="40" height="8" rx="2" fill="url(#keyGrad)" />
    <!-- Key Teeth -->
    <rect x="66" y="24" width="8" height="12" rx="2" fill="url(#keyGrad)" />
    <rect x="54" y="24" width="8" height="8" rx="2" fill="url(#keyGrad)" />
  </g>
</svg>
