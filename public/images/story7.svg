<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dcfce7" />
      <stop offset="100%" stop-color="#bbf7d0" />
    </linearGradient>
    <linearGradient id="doorGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b45309" />
      <stop offset="50%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="url(#bgGrad)" />

  <!-- Stone Frame -->
  <path d="M50,170 L50,55 C50,30 150,30 150,55 L150,170 Z" fill="#94a3b8" />
  <path d="M60,170 L60,60 C60,40 140,40 140,60 L140,170 Z" fill="#64748b" />

  <!-- Wooden Door -->
  <path d="M65,170 L65,65 C65,48 135,48 135,65 L135,170 Z" fill="url(#doorGrad)" />

  <!-- Door Panels (Planks) -->
  <line x1="88" y1="52" x2="88" y2="170" stroke="#78350f" stroke-width="2" />
  <line x1="112" y1="52" x2="112" y2="170" stroke="#78350f" stroke-width="2" />

  <!-- Door Handle (Golden Ring) -->
  <circle cx="120" cy="115" r="10" fill="none" stroke="#fef08a" stroke-width="3.5" />
  <circle cx="120" cy="115" r="3" fill="#facc15" />

  <!-- Ivy Vines & Leaves -->
  <!-- Vine 1 -->
  <path d="M40,40 Q 60,30 80,45 T 130,35 T 160,60" fill="none" stroke="#15803d" stroke-width="3" stroke-linecap="round" />
  
  <!-- Vine 2 hanging down -->
  <path d="M60,40 Q 55,80 62,110 T 58,150" fill="none" stroke="#16a34a" stroke-width="2.5" />

  <!-- Ivy Leaves (circles/path) -->
  <!-- Top -->
  <circle cx="50" cy="38" r="8" fill="#166534" />
  <circle cx="70" cy="36" r="9" fill="#15803d" />
  <circle cx="95" cy="42" r="7" fill="#166534" />
  <circle cx="115" cy="36" r="9" fill="#14532d" />
  <circle cx="138" cy="40" r="8" fill="#16a34a" />
  <circle cx="152" cy="50" r="7" fill="#15803d" />

  <!-- Hanging on left -->
  <circle cx="56" cy="65" r="8" fill="#15803d" />
  <circle cx="64" cy="85" r="7" fill="#14532d" />
  <circle cx="57" cy="105" r="9" fill="#16a34a" />
  <circle cx="62" cy="125" r="6" fill="#15803d" />
</svg>
