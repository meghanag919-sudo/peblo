<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fce7f3" />
      <stop offset="100%" stop-color="#fbcfe8" />
    </linearGradient>
    <linearGradient id="trunkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b45309" />
      <stop offset="100%" stop-color="#78350f" />
    </linearGradient>
    <linearGradient id="foliageGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="100%" stop-color="#fbbf24" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="url(#bgGrad)" />

  <!-- Pot -->
  <path d="M70,165 L130,165 L122,130 L78,130 Z" fill="#e11d48" />
  <rect x="66" y="124" width="68" height="6" rx="3" fill="#be123c" />

  <!-- Soil -->
  <ellipse cx="100" cy="130" rx="22" ry="5" fill="#451a03" />

  <!-- Tree Trunk -->
  <path d="M96,130 L96,80 C96,65 110,60 115,50" fill="none" stroke="url(#trunkGrad)" stroke-width="8" stroke-linecap="round" />
  <path d="M102,100 Q112,90 120,95" fill="none" stroke="url(#trunkGrad)" stroke-width="4" stroke-linecap="round" />

  <!-- Leaves/Foliage -->
  <circle cx="115" cy="45" r="22" fill="url(#foliageGrad)" opacity="0.95" />
  <circle cx="120" cy="95" r="14" fill="url(#foliageGrad)" opacity="0.95" />
  <circle cx="85" cy="70" r="18" fill="url(#foliageGrad)" opacity="0.9" />

  <!-- Lantern on the tree -->
  <g transform="translate(108, 55)">
    <!-- Hanging string -->
    <line x1="0" y1="0" x2="0" y2="10" stroke="#78350f" stroke-width="2" />
    <!-- Lantern body -->
    <rect x="-8" y="10" width="16" height="20" rx="5" fill="#facc15" stroke="#be123c" stroke-width="2" filter="drop-shadow(0 2px 4px rgba(250,204,21,0.5))" />
    <rect x="-6" y="14" width="12" height="12" rx="3" fill="#fffbeb" />
    <line x1="-8" y1="20" x2="8" y2="20" stroke="#be123c" stroke-width="2" />
  </g>

  <!-- Glowing Star Seed (Planted/Sprouting) -->
  <g transform="translate(62, 138) scale(0.6)">
    <polygon points="20,2 25,12 36,13 28,21 31,32 20,26 9,32 12,21 4,13 15,12" fill="url(#starGrad)" filter="drop-shadow(0 0 6px rgba(250,204,21,0.8))" />
  </g>
</svg>
