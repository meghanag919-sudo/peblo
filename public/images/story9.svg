<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe" />
      <stop offset="100%" stop-color="#bae6fd" />
    </linearGradient>
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="url(#bgGrad)" />

  <!-- Wave Back -->
  <path d="M-10,140 Q 40,115 90,135 T 210,130 L210,200 L-10,200 Z" fill="#0284c7" opacity="0.5" />

  <!-- Paper Boat -->
  <g transform="translate(100, 105)">
    <!-- Sail Left -->
    <polygon points="0,-45 -28,-5 0,-5" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
    <!-- Sail Right -->
    <polygon points="0,-48 32,-5 0,-5" fill="#cbd5e1" />
    
    <!-- Flag -->
    <polygon points="0,-45 10,-48 0,-52" fill="#ef4444" />

    <!-- Boat Hull Left -->
    <polygon points="-40,-5 0,15 0,-5" fill="#f1f5f9" />
    <!-- Boat Hull Right -->
    <polygon points="40,-5 0,15 0,-5" fill="#e2e8f0" />
    
    <!-- Shadow underneath -->
    <ellipse cx="0" cy="18" rx="30" ry="4" fill="#0369a1" opacity="0.3" />
  </g>

  <!-- Wave Front -->
  <path d="M-10,155 Q 50,135 100,150 T 210,145 L210,200 L-10,200 Z" fill="url(#waterGrad)" />
  
  <!-- Splash lines -->
  <path d="M45,162 Q 55,155 58,160" fill="none" stroke="#bae6fd" stroke-width="2" stroke-linecap="round" />
  <path d="M142,158 Q 150,152 154,157" fill="none" stroke="#bae6fd" stroke-width="2" stroke-linecap="round" />
</svg>
