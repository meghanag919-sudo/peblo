<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3f4f6" />
      <stop offset="100%" stop-color="#e5e7eb" />
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="url(#bgGrad)" />

  <!-- Confetti / Drops falling -->
  <!-- Raindrops -->
  <path d="M55,125 Q 52,140 55,142 Q 58,140 55,125" fill="#38bdf8" />
  <path d="M145,125 Q 142,140 145,142 Q 148,140 145,125" fill="#38bdf8" />

  <!-- Confetti drops -->
  <!-- Pink -->
  <circle cx="75" cy="135" r="4" fill="#f43f5e" />
  <!-- Purple -->
  <rect x="98" y="140" width="6" height="8" rx="2" fill="#8b5cf6" transform="rotate(25 101 144)" />
  <!-- Yellow -->
  <polygon points="120,130 126,133 122,138" fill="#eab308" />
  <!-- Green -->
  <rect x="85" y="152" width="8" height="4" rx="1" fill="#10b981" transform="rotate(-15 89 154)" />
  <!-- Orange -->
  <circle cx="132" cy="148" r="3.5" fill="#f97316" />

  <!-- Happy Cloud -->
  <g transform="translate(10, 5)">
    <!-- Cloud base shadow -->
    <path d="M40,95 C40,75 70,68 85,75 C95,60 135,62 145,82 C160,82 170,95 162,108 C155,116 40,118 40,95 Z" fill="#cbd5e1" opacity="0.3" />
    
    <!-- Cloud Main Body -->
    <path d="M40,90 C40,70 70,63 85,70 C95,55 135,57 145,77 C160,77 170,90 162,103 C155,111 40,113 40,90 Z" fill="url(#cloudGrad)" filter="drop-shadow(0 4px 6px rgba(148,163,184,0.15))" />

    <!-- Cute Face -->
    <!-- Eyes -->
    <circle cx="85" cy="88" r="4.5" fill="#334155" />
    <circle cx="115" cy="88" r="4.5" fill="#334155" />
    <circle cx="83" cy="86" r="1.5" fill="#ffffff" />
    <circle cx="113" cy="86" r="1.5" fill="#ffffff" />
    
    <!-- Cheeks (Blush) -->
    <circle cx="76" cy="93" r="5" fill="#fca5a5" opacity="0.6" />
    <circle cx="124" cy="93" r="5" fill="#fca5a5" opacity="0.6" />

    <!-- Mouth -->
    <path d="M96,93 Q100,98 104,93" fill="none" stroke="#334155" stroke-width="2.5" stroke-linecap="round" />
  </g>

  <!-- Music Notes floating -->
  <g transform="translate(130, 25) scale(0.8)">
    <path d="M10,15 L10,35 A 4,3 0 1,1 6,38 L6,15 Z" fill="#ec4899" />
    <path d="M10,19 Q15,19 18,14" fill="none" stroke="#ec4899" stroke-width="3" stroke-linecap="round" />
  </g>
  <g transform="translate(42, 28) rotate(-15) scale(0.7)">
    <path d="M10,15 L10,35 A 4,3 0 1,1 6,38 L6,15 Z" fill="#8b5cf6" />
    <path d="M10,19 Q15,19 18,14" fill="none" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round" />
  </g>
</svg>
